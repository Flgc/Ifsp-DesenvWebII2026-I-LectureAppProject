<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="text-center mb-4">Editar Evento</h2>

          @if (mensagemErro) {
            <div class="alert alert-danger">{{ mensagemErro }}</div>
          }

          @if (carregando) {
            <div class="text-center">Carregando dados...</div>
          }

          @if (!carregando) {
            <form [formGroup]="eventoForm" (ngSubmit)="atualizar()">
              <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" formControlName="titulo">
              </div>

              <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" rows="3" formControlName="descricao"></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">Palestrante</label>
                <input type="text" class="form-control" formControlName="nomePalestrante">
              </div>

              <div class="mb-3">
                <label class="form-label">Local</label>
                <input type="text" class="form-control" formControlName="localEvento">
              </div>

              <div class="mb-3">
                <label class="form-label">Data e Hora</label>
                <input type="datetime-local" class="form-control" formControlName="dataEvento">
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100">Atualizar</button>
                <button type="button" class="btn btn-secondary w-100" routerLink="/home">Voltar</button>
              </div>
            </form>
          }
        </div>
      </div>
    </div>
  </div>
</div>
