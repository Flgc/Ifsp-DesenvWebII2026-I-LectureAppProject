<div class="container mt-5">
 <div class="row justify-content-center">
  <div class="col-md-5">
   <div class="card shadow">
    <div class="card-body">
      <h2
       class="text-center mb-4">
       Login
      </h2>

<!--       <div
       *ngIf="mensagem"
       class="alert alert-danger">
       {{mensagem}}
      </div> -->

      @if (mensagem) {
        <div class="alert alert-danger">
            {{ mensagem }}
        </div>
      }      

      <form
       [formGroup]="loginForm"
       (ngSubmit)="entrar()">

       <div class="mb-3">
        <label>E-mail</label>
        <input
         type="email"
         class="form-control"
         formControlName="email">
       </div>

       <div class="mb-3">
        <label>Senha</label>
        <input
         type="password"
         class="form-control"
         formControlName="senha">
       </div>

       <button
        class="btn btn-primary w-100">
        Entrar
       </button>

      </form>
      <hr>
      <a
       routerLink="/cadastro">
       Criar Conta
      </a>
    </div>
   </div>
  </div>
 </div>
</div>
